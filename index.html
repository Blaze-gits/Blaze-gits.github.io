<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blaze-gits - VK Bitcoin</title>
  <meta name="description" content="Official developer site for Blaze-gits apps by Chinonso Iroegbu.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at top, #1a1200 0%, #0a0a0a 60%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 20%, rgba(255, 215, 0, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 165, 0, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    .container {
      position: relative;
      z-index: 1;
      max-width: 700px;
    }
    
    .logo {
      width: 200px;
      height: 200px;
      border-radius: 36px;
      margin-bottom: 32px;
      box-shadow: 
        0 0 60px rgba(255, 215, 0, 0.5),
        0 0 120px rgba(255, 215, 0, 0.2),
        inset 0 0 20px rgba(255, 215, 0, 0.1);
      border: 2px solid rgba(255, 215, 0, 0.3);
      transition: transform 0.3s ease;
    }
    
    .logo:hover {
      transform: scale(1.05);
    }
    
    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
      letter-spacing: -1px;
    }
    
    .subtitle {
      font-size: 1.2rem;
      color: #d4af37;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    
    p {
      font-size: 1.1rem;
      color: #c0c0c0;
      line-height: 1.7;
      margin-bottom: 16px;
    }
    
    .divider {
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #FFD700, transparent);
      margin: 30px auto;
    }
    
    .contact {
      margin-top: 24px;
      padding: 20px;
      background: rgba(255, 215, 0, 0.05);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }
    
    .contact a {
      color: #FFD700;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .contact a:hover {
      color: #FFA500;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    }
    
    .footer {
      margin-top: 50px;
      font-size: 0.9rem;
      color: #666;
    }
    
    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      .logo { width: 160px; height: 160px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="icon.png" alt="VK Bitcoin Logo" class="logo">
    <h1>Blaze-gits</h1>
    <div class="subtitle">Game Developer</div>
    <p>Official site for VK Bitcoin and other Blaze-gits apps.</p>
    
    <div class="divider"></div>
    
    <div class="contact">
      <p>For support and inquiries:</p>
      <p><a href="mailto:chinonsoiroegbu3311@gmail.com">chinonsoiroegbu3311@gmail.com</a></p>
    </div>
    
    <div class="footer">
      © 2026 Chinonso Iroegbu. All rights reserved.
    </div>
  </div>
</body>
</html>
